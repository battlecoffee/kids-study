<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2B2B33;--paper:#FBFAF6;--coin:#E0941A;--date:#2f8f6f;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Nunito","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--paper);color:var(--ink);
    min-height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:clamp(24px,4vw,56px);
    padding:6vw;text-align:center;-webkit-font-smoothing:antialiased;
  }
  .back{
    position:fixed;top:14px;left:14px;text-decoration:none;
    font-weight:800;font-size:clamp(15px,1.6vw,20px);color:var(--ink);
    background:#fff;border-radius:14px;padding:9px 14px;box-shadow:0 4px 0 #e6e2d8;
  }
  .back:active{transform:translateY(2px);box-shadow:0 2px 0 #e6e2d8;}
  .title{font-family:"Fredoka",sans-serif;font-weight:700;font-size:clamp(34px,6vw,84px);line-height:1.05;}
  .title small{display:block;font-family:"Nunito";font-weight:700;font-size:.32em;color:#8a8a93;letter-spacing:1px;margin-top:.5em;}
  .subjects{display:flex;gap:clamp(20px,3vw,48px);flex-wrap:wrap;justify-content:center;}
  .subject{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3em;
    text-decoration:none;color:var(--ink);
    background:#fff;border-radius:32px;border:5px solid #EFEDE5;
    box-shadow:0 12px 36px rgba(40,40,60,.10);
    padding:clamp(28px,4vw,64px) clamp(36px,5vw,90px);min-width:min(70vw,300px);
    transition:transform .14s ease,box-shadow .14s ease,border-color .15s ease;
  }
  .subject:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(40,40,60,.16);}
  .subject .ico{font-size:clamp(64px,9vw,130px);line-height:1;}
  .subject .name{font-family:"Fredoka",sans-serif;font-weight:700;font-size:clamp(28px,3.6vw,56px);}
  .subject .en{font-weight:800;font-size:clamp(14px,1.5vw,22px);color:#9a9aa2;letter-spacing:1px;}
  .subject.coin{border-color:#FFF4E2;} .subject.coin .name{color:var(--coin);}
  .subject.date{border-color:#E7F3EE;} .subject.date .name{color:var(--date);}
</style>
</head>
<body>
  <a class="back" href="../index.html">⬅️ 回首頁</a>
  <div class="title">數學
    <small>SELECT A TOPIC</small>
  </div>
  <div class="subjects">
    <a class="subject coin" href="錢幣闖關.html">
      <span class="ico">🪙</span>
      <span class="name">錢幣闖關</span>
      <span class="en">COINS</span>
    </a>
    <a class="subject date" href="日期小高手.html">
      <span class="ico">📅</span>
      <span class="name">日期小高手</span>
      <span class="en">DATES</span>
    </a>
  </div>
</body>
</html>
